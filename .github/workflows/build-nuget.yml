name: Build nuget package

on:
  workflow_dispatch:

jobs:
  build-nuget-package:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      
      - name: Setup MSBuild (VS 2026)
        uses: microsoft/setup-msbuild@v3
        
      - name: Install .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build nuget package (pack)
        working-directory: "src\\AuthenticodeExaminer"
        run: |
          dotnet pack -c Release

      - name: Upload nuget package
        uses: actions/upload-artifact@v7
        with:
          name: AuthenticodeExaminer-Nuget-Package
          path: |
            src\\AuthenticodeExaminer\\bin\\Release\\*.nupkg